name: Node pnpm Quality

# Reusable workflow: lint, typecheck, optional format check.
# Intended to be called from a CI After Gate workflow triggered by workflow_run.
#
# The job name "Quality" is stable — branch protection rulesets reference it.

on:
  workflow_call:
    inputs:
      ref:
        description: Commit SHA or ref to check out.
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: "lts/*"
      pnpm_version:
        description: pnpm version to install. Leave empty to read from packageManager in package.json.
        required: false
        type: string
        default: ""
      install_command:
        required: false
        type: string
        default: "pnpm install --frozen-lockfile"
      lint_command:
        required: false
        type: string
        default: "pnpm lint"
      typecheck_command:
        required: false
        type: string
        default: "pnpm typecheck"
      format_command:
        description: Format check command. Leave empty to skip.
        required: false
        type: string
        default: ""
      working_directory:
        description: Working directory for all commands.
        required: false
        type: string
        default: "."

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm_version }}

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm

      - name: Install dependencies
        run: ${{ inputs.install_command }}

      - name: Lint
        run: ${{ inputs.lint_command }}

      - name: Typecheck
        run: ${{ inputs.typecheck_command }}

      - name: Format check
        if: ${{ inputs.format_command != '' }}
        run: ${{ inputs.format_command }}
